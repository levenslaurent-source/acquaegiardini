name: Déploiement GitHub Pages

on:
  push:
    branches:
      - main
      - claude/create-order-form-app-71X7Y
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on annule les déploiements en cours.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v5

      - name: Installation de Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Build de production
        run: npm run build

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Envoi de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publication sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
